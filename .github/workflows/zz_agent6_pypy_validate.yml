# NOTE: [VALIDATE-ONLY] (DO NOT MERGE). Builds the pypy-310 test image on the fork to
# confirm the lxml==4.9.4 pin fixes the "libxml2 and libxslt" PyPy build failure.
name: "ZZ agent6 pypy-310 image validate"

on:
  push:
    branches:
      - 'ci-fix/agent6-b40-pypy-lxml'
  workflow_dispatch:

jobs:
  build-pypy-image:
    name: Build pypy-310 image (validates lxml fix)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build the pypy-310 Docker image
        run: |
          set -e
          echo "Building dev/spark-test-image/pypy-310/Dockerfile ..."
          docker build -f dev/spark-test-image/pypy-310/Dockerfile \
            -t spark-pypy310-validate dev/spark-test-image/pypy-310
      - name: Confirm lxml imports under PyPy
        run: |
          set -e
          docker run --rm spark-pypy310-validate \
            pypy3 -c "import lxml.etree, lxml.html; print('lxml OK', lxml.etree.__version__)"
