name: "[DO-NOT-MERGE] agent4 validate MetricsFailureInjection fix"

on:
  push:
    branches:
      - "ci-fix/agent4-metrics-injection-flake**"
  workflow_dispatch:

jobs:
  validate:
    name: "MetricsFailureInjectionSuite x8 on ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Build sql/core test deps once
        run: build/sbt "sql/Test/compile"
      - name: Run MetricsFailureInjectionSuite 8 times (was ~60% flaky before fix)
        run: |
          fails=0
          for i in 1 2 3 4 5 6 7 8; do
            echo "===== iteration $i ====="
            if build/sbt "sql/testOnly org.apache.spark.sql.execution.metric.MetricsFailureInjectionSuite" > /tmp/it$i.log 2>&1; then
              echo "iteration $i: PASS"
            else
              echo "iteration $i: FAIL"; fails=$((fails+1))
              grep -nE "\*\*\* FAILED|was not greater|did not equal|Tests: succeeded" /tmp/it$i.log | tail -10 || true
            fi
          done
          echo "===== SUMMARY: $fails / 8 iterations FAILED ====="
          if [ "$fails" -ne 0 ]; then echo "STILL FLAKY"; exit 1; fi
          echo "ALL GREEN"
