name: "[DO-NOT-MERGE] agent4 validate MetricsFailureInjection fix"

on:
  push:
    branches:
      - "ci-fix/agent4-metrics-injection-flake**"
  workflow_dispatch:

jobs:
  validate:
    name: "MetricsFailureInjectionSuite (full) x8 on ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Build sql/core test deps once
        run: build/sbt "sql/Test/compile"
      - name: Run FULL MetricsFailureInjectionSuite 8 times (was ~1/6 flaky before fix)
        run: |
          fails=0
          for i in $(seq 1 8); do
            echo "===== iteration $i ====="
            if build/sbt "sql/testOnly org.apache.spark.sql.execution.metric.MetricsFailureInjectionSuite" > /tmp/it$i.log 2>&1; then
              echo "iteration $i: PASS ($(grep -oE 'Tests: succeeded [0-9]+, failed [0-9]+' /tmp/it$i.log | tail -1))"
            else
              echo "iteration $i: FAIL"; fails=$((fails+1))
              grep -oE '- [^*]+ \*\*\* FAILED|was not greater|recompute after [0-9]+ attempts' /tmp/it$i.log | head -5 || true
            fi
          done
          echo "===== SUMMARY: $fails / 8 iterations FAILED ====="
          if [ "$fails" -ne 0 ]; then echo "STILL FLAKY"; exit 1; fi
          echo "ALL GREEN"
