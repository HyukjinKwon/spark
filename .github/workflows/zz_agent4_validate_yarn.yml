name: "[DO-NOT-MERGE] agent4 validate YarnClusterSuite fix"

on:
  push:
    branches:
      - "ci-fix/agent4-yarn-minicluster-nm-mem**"
  workflow_dispatch:

jobs:
  validate-yarn:
    name: "YarnClusterSuite rep ${{ matrix.rep }} (JDK ${{ matrix.java }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17]
        rep: [1, 2, 3, 4, 5, 6]
    env:
      SPARK_LOCAL_IP: localhost
      SERIAL_SBT_TESTS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ matrix.java }}
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64
      - name: Install Python packages
        run: |
          python3.12 -m pip install 'numpy>=1.23.2' pyarrow 'pandas==2.3.3' pyyaml scipy
      - name: Run YarnClusterSuite (yarn module)
        shell: 'script -q -e -c "bash {0}"'
        run: |
          export TERM=vt100
          # Build + run only the yarn module tests. YarnClusterSuite is the flaky one.
          build/sbt -Pyarn "yarn/testOnly org.apache.spark.deploy.yarn.YarnClusterSuite"
      - name: Upload unit tests log on failure
        if: ${{ !success() }}
        uses: actions/upload-artifact@v7
        with:
          name: agent4-yarn-log-rep${{ matrix.rep }}-jdk${{ matrix.java }}
          path: "**/target/*.log"
