# Throwaway workflow to reproduce/verify the OrcSource* leaked-file-stream flake.
# Runs OrcSourceV1Suite + OrcSourceV2Suite N times and reports the abort if any.
name: "ORC leak repro"

on:
  push:
    branches:
      - "deflake/**"
  workflow_dispatch:
    inputs:
      iterations:
        description: "How many times to run the Orc suites"
        required: true
        default: "8"

env:
  ITERATIONS: ${{ github.event.inputs.iterations || '10' }}

jobs:
  orc-repro:
    name: Orc suites repro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Cache SBT/Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            ~/.ivy2/cache
          key: orc-repro-${{ hashFiles('**/pom.xml', 'project/build.properties', 'build.sbt', 'project/plugins.sbt') }}
          restore-keys: |
            orc-repro-
      - name: Run OrcSource suites repeatedly
        run: |
          export SBT_OPTS="-Xmx6g -Xss64m"
          N="${ITERATIONS}"
          fail=0
          for i in $(seq 1 "$N"); do
            echo "::group::iteration $i / $N"
            if ./build/sbt \
                "sql/testOnly org.apache.spark.sql.execution.datasources.orc.OrcSourceV1Suite org.apache.spark.sql.execution.datasources.orc.OrcSourceV2Suite" \
                2>&1 | tee iter_$i.log | tail -40; then
              if grep -qE "\*\*\* ABORTED \*\*\*|possibly leaked file streams" iter_$i.log; then
                echo "iteration $i: ABORTED / leaked stream detected"
                fail=$((fail+1))
              else
                echo "iteration $i: OK"
              fi
            else
              echo "iteration $i: sbt returned non-zero"
              grep -aE "\*\*\* ABORTED \*\*\*|possibly leaked file streams|Tests: succeeded" iter_$i.log | tail -5 || true
              fail=$((fail+1))
            fi
            echo "::endgroup::"
          done
          echo "================ SUMMARY ================"
          echo "failed/aborted iterations: $fail / $N"
          grep -aHE "possibly leaked file streams|\*\*\* ABORTED \*\*\*" iter_*.log || echo "no aborts observed"
          # Do not fail the job on abort; we want the summary regardless.
