name: "[DO-NOT-MERGE] agent4 diagnose metrics flake"

on:
  push:
    branches:
      - "ci-fix/agent4-metrics-diag**"
  workflow_dispatch:

jobs:
  diag:
    name: "diagnose MetricsFailureInjection on macos-15"
    runs-on: macos-15
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Build sql/core test deps once
        run: build/sbt "sql/Test/compile"
      - name: Run injectFailure=true 10x, capture DIAG line + FetchFailed/recompute markers
        run: |
          for i in $(seq 1 10); do
            echo "===== iteration $i ====="
            build/sbt "sql/testOnly org.apache.spark.sql.execution.metric.MetricsFailureInjectionSuite -- -z \"Non-deterministic stage block failure injection - injectFailure=true\"" > /tmp/it$i.log 2>&1 || true
            if grep -q "injectFailure=true \*\*\* FAILED" /tmp/it$i.log; then res=FAIL; else res=PASS; fi
            echo "iteration $i: $res"
            echo "  DIAG: $(grep -oE 'DIAG stage1=[0-9]+ stage2=[0-9]+ stage1SLAM=[^ )]+' /tmp/it$i.log | head -1)"
            echo "  markers: FetchFailed=$(grep -c 'FetchFailed' /tmp/it$i.log) Resubmit=$(grep -c 'Resubmitting' /tmp/it$i.log) corrupt=$(grep -c 'Test injection: corrupted' /tmp/it$i.log) rollback=$(grep -c 'rollbackSucceedingStages\|indeterminate' /tmp/it$i.log)"
          done
      - name: Upload one full log for inspection
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: metrics-diag-logs
          path: /tmp/it*.log
