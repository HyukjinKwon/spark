name: "[DO-NOT-MERGE] agent4 diagnose metrics flake"

on:
  push:
    branches:
      - "ci-fix/agent4-metrics-diag**"
  workflow_dispatch:

jobs:
  diag:
    name: "diagnose MetricsFailureInjection on macos-15"
    runs-on: macos-15
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Build sql/core test deps once
        run: build/sbt "sql/Test/compile"
      - name: Run the FULL suite 6x, capture the DIAG line for the failing test + markers
        run: |
          for i in $(seq 1 6); do
            echo "===== iteration $i (full MetricsFailureInjectionSuite) ====="
            build/sbt "sql/testOnly org.apache.spark.sql.execution.metric.MetricsFailureInjectionSuite" > /tmp/it$i.log 2>&1 || true
            if grep -q "\*\*\* FAILED" /tmp/it$i.log; then res=FAIL; else res=PASS; fi
            echo "iteration $i: $res"
            echo "  failed tests: $(grep -oE '- [^*]+ \*\*\* FAILED' /tmp/it$i.log | head -5 | tr '\n' '|')"
            echo "  DIAG: $(grep -oE 'DIAG stage1=[0-9]+ stage2=[0-9]+ stage1SLAM=[^ )]+' /tmp/it$i.log | head -3 | tr '\n' ' ')"
            echo "  totals: $(grep -oE 'Tests: succeeded [0-9]+, failed [0-9]+' /tmp/it$i.log | tail -1)"
          done
      - name: Upload one full log for inspection
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: metrics-diag-logs
          path: /tmp/it*.log
