#
# [DO-NOT-MERGE] Focused validation for the branch-3.5 linter black pin fix.
#
# The full scheduled `build_branch35` job cannot be reproduced GREEN on a fork because it uses
# master's workflow file with branch-3.5 source; the reusable build_and_test.yml "Sync the current
# branch with the latest in Apache Spark" step then merges the branch against apache/spark@branch-3.5
# and explodes in conflicts (master/branch-3.5 divergence), so the Linters job never runs.
#
# This workflow validates the EXACT failing step in isolation: the python3.9 pip install of the
# branch-3.5 linter deps. It proves (1) the OLD pin `black==26.3.1` fails to install on Python 3.9
# (the root cause), and (2) the FIXED pin `black==22.6.0` installs cleanly and matches branch-3.5's
# dev/pyproject.toml required-version.
#
name: "[VALIDATION] branch-3.5 black pin"

on:
  push:
    branches: ['ci-fix/branch35-validate']
  workflow_dispatch:

jobs:
  validate-black-pin:
    name: Validate branch-3.5 linter black pin on Python 3.9
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Demonstrate the ROOT CAUSE - old pin black==26.3.1 fails on Python 3.9
        run: |
          set +e
          python3.9 -m pip install 'black==26.3.1'
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "UNEXPECTED: black==26.3.1 installed on Python 3.9 - root cause not reproduced"
            exit 1
          fi
          echo "OK: black==26.3.1 correctly fails to install on Python 3.9 (Requires-Python >= 3.10)"

      - name: Validate the FIX - exact branch-3.5 linter install line with black==22.6.0
        run: |
          # Identical to .github/workflows/build_and_test.yml "Install Python linter dependencies
          # for branch-3.5", with the fix applied.
          python3.9 -m pip install 'flake8==3.9.0' pydata_sphinx_theme 'mypy==0.982' 'pytest==7.1.3' 'pytest-mypy-plugins==1.9.3' numpydoc 'jinja2<3.0.0' 'black==22.6.0'
          python3.9 -m pip install 'pandas-stubs==1.2.0.53' ipython 'grpcio==1.56.0' 'grpc-stubs==1.24.11' 'googleapis-common-protos-stubs==2.2.0'

      - name: Confirm black version matches branch-3.5 dev/pyproject required-version (22.6.0)
        run: |
          v=$(python3.9 -m black --version)
          echo "$v"
          echo "$v" | grep -q "22.6.0" || { echo "black version is not 22.6.0"; exit 1; }
          echo "OK: black 22.6.0 installed - matches branch-3.5 dev/pyproject.toml [tool.black] required-version"
