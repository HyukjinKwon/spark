# NOTE: [VALIDATE-ONLY] (DO NOT MERGE). Compiles core test code and runs SorterSuite to
# confirm the retryOnOOM signature change compiles and the OOM-sensitive test still passes.
# (The underlying OOM is intermittent ~1/5; this verifies correctness of the change, not
# statistical elimination of the flake.)
name: "ZZ agent6 SorterSuite / retryOnOOM validate"

on:
  push:
    branches:
      - 'ci-fix/agent6-retryonoom-robust'
  workflow_dispatch:

jobs:
  sortersuite:
    name: Compile core + run SorterSuite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Run SorterSuite (SBT)
        run: |
          set -e
          # Match the CI test heap so the ~1GB allocation in SorterSuite has room.
          export SBT_OPTS="-Xss64m -Xmx4g -Xms2g -XX:ReservedCodeCacheSize=128m"
          ./build/sbt "core/testOnly org.apache.spark.util.collection.SorterSuite"
