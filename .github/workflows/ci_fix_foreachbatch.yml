# DO-NOT-MERGE: temporary focused workflow used only to validate the
# SparkConnectSessionHolderSuite foreachBatch-termination flakiness fix on a fork.
# It builds the connect (server) module test classes once, then re-runs ONLY the
# "process terminates after query is stopped" test several times to confirm the
# previously-deadlocking query.stop() is now stable. Drop before merging the fix.
name: "DO-NOT-MERGE CI fix - connect foreachBatch termination"

on:
  workflow_dispatch:
  push:
    branches:
      - 'ci-fix/agent7-foreachbatch-interruptible'

jobs:
  foreachbatch:
    name: "Build connect + repeat foreachBatch termination test"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SPARK_LOCAL_IP: localhost
      SKIP_UNIDOC: true
      SKIP_MIMA: true
      SKIP_PACKAGING: true
      SERIAL_SBT_TESTS: 1
      HADOOP_PROFILE: hadoop3
      HIVE_PROFILE: hive2.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Free up disk space
        run: |
          if [ -f ./dev/free_disk_space ]; then ./dev/free_disk_space; fi
      - name: Install Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - name: Install Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: x64
      - name: Install Python packages (Python 3.12)
        run: |
          python3.12 -m pip install 'numpy>=1.23.2' pyarrow 'pandas==2.3.3' pyyaml scipy unittest-xml-reporting 'lxml==4.9.4' 'grpcio==1.76.0' 'grpcio-status==1.76.0' 'protobuf==6.33.5' 'zstandard==0.25.0'
          python3.12 -m pip list
      # Phase 1: compile the connect (server) module + its dependencies once.
      - name: Build connect module test classes
        shell: 'script -q -e -c "bash {0}"'
        run: |
          export TERM=vt100
          ./build/sbt -Phive -Phadoop-3 "connect/Test/compile"
      # Phase 2: re-run ONLY the foreachBatch termination test, reusing the jars
      # built above. It MUST actually run (not be assume-skipped): check that the
      # output reports "Tests: succeeded 1" each iteration, not 0.
      - name: Repeat foreachBatch termination test (flakiness check)
        shell: 'script -q -e -c "bash {0}"'
        run: |
          export TERM=vt100
          for i in $(seq 1 12); do
            echo "==================== foreachBatch termination iteration $i ===================="
            ./build/sbt -Phive -Phadoop-3 \
              "connect/testOnly org.apache.spark.sql.connect.service.SparkConnectSessionHolderSuite -- -z \"process terminates after query is stopped\""
          done
