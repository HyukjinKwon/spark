name: "[DO-NOT-MERGE] agent4 validate macOS mllib FP-tolerance fix"

on:
  push:
    branches:
      - "ci-fix/agent4-mllib-fp-tol**"
  workflow_dispatch:

jobs:
  validate-macos-mllib:
    name: "mllib prediction suites on ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    env:
      SPARK_LOCAL_IP: localhost
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Run the mllib suites that hit the transform-vs-predict FP diff
        run: |
          # These suites use MLTest.testClassificationModelSingleRawPrediction /
          # testProbClassificationModelSingleProbPrediction, which failed on arm64 macOS
          # with last-ULP mismatches before this fix.
          build/sbt \
            "mllib/testOnly org.apache.spark.ml.classification.MultilayerPerceptronClassifierSuite org.apache.spark.ml.classification.LogisticRegressionSuite org.apache.spark.ml.classification.LinearSVCSuite org.apache.spark.ml.classification.NaiveBayesSuite"
